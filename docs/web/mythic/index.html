<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mythic Amps</title>
  <meta name="description" content="Mythic Amps — coming soon." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;1,300&family=Josefin+Sans:wght@100;300&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:      #E3E2D6;
      --text:    #2a2924;
      --muted:   #6b6a62;
      --accent:  #4a4940;
      --link:    #3d3c35;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Josefin Sans', sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Main ──────────────────────────────────────────────────────────── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }

    .image-wrap {
      opacity: 0;
      animation: appear 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
    }

    .image-wrap img {
      display: block;
      max-width: min(640px, 90vw);
      height: auto;
    }

    @keyframes appear {
      to { opacity: 1; }
    }

    /* ── Footer ────────────────────────────────────────────────────────── */
    footer {
      padding: 1.5rem 2rem;
      text-align: center;
      border-top: 0.5px solid rgba(42, 41, 36, 0.15);

      opacity: 0;
      animation: appear 1s ease 0.8s forwards;
    }

    footer p {
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 100;
      font-size: 0.72rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
    }

    footer a {
      color: var(--link);
      text-decoration: none;
      border-bottom: 0.5px solid rgba(42, 41, 36, 0.3);
      padding-bottom: 1px;
      transition: border-color 0.2s ease, color 0.2s ease;
      font-family: 'Cormorant', serif;
      font-weight: 300;
      font-style: italic;
      font-size: 1em;
      letter-spacing: 0.05em;
      text-transform: none;
    }

    footer a:hover {
      color: var(--accent);
      border-color: var(--accent);
    }
  </style>
</head>
<body>

  <main>
    <div class="image-wrap">
      <img src="mythic_coming.png" alt="Mythic Amps — coming soon" />
    </div>
  </main>

  <footer>
    <p>A <a href="https://littlewolfacres.com">Little Wolf Acres, LLC</a> venture</p>
  </footer>

</body>
</html>
