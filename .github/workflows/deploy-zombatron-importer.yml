name: Deploy Zombatron Importer

on:
  push:
    branches: [master]
    paths:
      - 'services/apex/zombatron-importer/**'
      - 'services/apex/ansible/roles/zombatron_importer/**'
      - 'services/apex/ansible/playbooks/deploy-zombatron-importer.yml'
      - '.github/workflows/deploy-zombatron-importer.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Zombatron Importer to apex
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.APEX_SSH_KEY }}" > ~/.ssh/apex_deploy
          chmod 600 ~/.ssh/apex_deploy
          ssh-keyscan -H apex.littlewolfacres.com >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Run Ansible playbook on apex
        run: |
          ssh -i ~/.ssh/apex_deploy \
              -o StrictHostKeyChecking=no \
              speddling@apex.littlewolfacres.com \
              "cd homelab && ansible-playbook \
                --vault-password-file .vault_pass \
                -i services/apex/ansible/inventory.ini \
                services/apex/ansible/playbooks/deploy-zombatron-importer.yml \
                -v"

      - name: Verify service is running
        run: |
          ssh -i ~/.ssh/apex_deploy \
              -o StrictHostKeyChecking=no \
              speddling@apex.littlewolfacres.com \
              "launchctl list com.littlewolfacres.zombatron-importer \
               && echo 'Zombatron Importer is running' \
               || (echo 'Service not found'; exit 1)"
