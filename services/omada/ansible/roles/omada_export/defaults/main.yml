---
# Where exported state is written (committed for config-as-backup).
# playbook_dir is absolute: .../services/omada/ansible/playbooks
# Two dirname() calls climb to .../services/omada, then append /state.
# Computed (not ".."-relative) so it resolves to a real absolute path
# regardless of the step's working-directory — the ".." form resolved
# against the run step's CWD (services/omada/ansible) and wrongly wrote
# to services/state/.
omada_state_dir: "{{ (playbook_dir | dirname | dirname) }}/state"

# TLS verification. OC200 ships a self-signed cert, so default is false.
# Flip to true once a trusted cert is installed on the controller.
omada_validate_certs: false

# Read-only object groups to export in Phase 1. Each maps to an Open API
# endpoint; see tasks/main.yml. Trimmed to what's confirmed GET-able —
# expand once the first export proves endpoint coverage on this controller.
omada_export_targets:
  - sites
  - devices
