---
- name: Configure Samba file server (vault + studio-archive)
  hosts: monolith
  become: true

  vars_files:
    - "{{ playbook_dir }}/../../../../ansible/vars/main.yml"
    - "{{ playbook_dir }}/../../../../ansible/vars/vault.yml"

  tasks:
    - name: Install Samba and dependencies
      ansible.builtin.apt:
        name:
          - samba
          - expect
          - python3-pexpect
          - ufw
        state: present
        update_cache: true

    - name: Create vault Samba user
      ansible.builtin.user:
        name: "{{ samba_user }}"
        shell: /sbin/nologin
        create_home: false
        state: present

    - name: Create james Samba user
      ansible.builtin.user:
        name: "{{ james_user }}"
        shell: /sbin/nologin
        create_home: false
        state: present

    - name: Create vault share directory
      ansible.builtin.file:
        path: "{{ vault_share_path }}"
        state: directory
        mode: "0775"
        owner: "{{ samba_user }}"
        group: "{{ samba_user }}"

    - name: Create studio-archive share directory
      ansible.builtin.file:
        path: "{{ studio_share_path }}"
        state: directory
        mode: "0770"
        owner: "{{ james_user }}"
        group: "{{ james_user }}"

    - name: Set Samba password for vault
      ansible.builtin.expect:
        command: smbpasswd -a {{ samba_user }}
        responses:
          "New SMB password:": "{{ vault_samba_password }}"
          "Retype new SMB password:": "{{ vault_samba_password }}"
      no_log: true
      changed_when: false

    - name: Enable vault Samba user
      ansible.builtin.shell: smbpasswd -e {{ samba_user }}
      changed_when: false

    - name: Set Samba password for james
      ansible.builtin.expect:
        command: smbpasswd -a {{ james_user }}
        responses:
          "New SMB password:": "{{ vault_james_password }}"
          "Retype new SMB password:": "{{ vault_james_password }}"
      no_log: true
      changed_when: false

    - name: Enable james Samba user
      ansible.builtin.shell: smbpasswd -e {{ james_user }}
      changed_when: false

    - name: Create music library share directory (top-level only — no recursive chown)
      ansible.builtin.file:
        path: "{{ music_share_path }}"
        state: directory
        mode: "0775"
        owner: "{{ james_user }}"
        group: "{{ james_user }}"

    - name: Write smb.conf
      ansible.builtin.template:
        src: ../templates/smb.conf.j2
        dest: /etc/samba/smb.conf
        owner: root
        group: root
        mode: "0644"
      notify: Restart Samba

    - name: Enable and start Samba services
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: true
        state: started
      loop:
        - smbd
        - nmbd

  handlers:
    - name: Restart Samba
      ansible.builtin.systemd:
        name: smbd
        state: restarted


- name: Mount music-library share on Studio
  hosts: studio
  become: true

  vars_files:
    - "{{ playbook_dir }}/../../../../ansible/vars/main.yml"
    - "{{ playbook_dir }}/../../../../ansible/vars/vault.yml"

  tasks:
    - name: Install cifs-utils
      ansible.builtin.apt:
        name: cifs-utils
        state: present
        update_cache: true

    - name: Create music library mount point
      ansible.builtin.file:
        path: "{{ studio_music_mount }}"
        state: directory
        mode: "0755"

    - name: Deploy Samba credentials file
      ansible.builtin.template:
        src: ../templates/studio-music-creds.j2
        dest: "{{ studio_music_creds_file }}"
        owner: root
        group: root
        mode: "0600"

    - name: Add music-library fstab entry
      ansible.posix.mount:
        path: "{{ studio_music_mount }}"
        src: "//{{ ip_monolith }}/{{ music_share_name }}"
        fstype: cifs
        opts: "credentials={{ studio_music_creds_file }},uid=1000,gid=1000,file_mode=0664,dir_mode=0775,vers=3.0,_netdev,x-systemd.automount"
        state: mounted
        dump: "0"
        passno: "0"
