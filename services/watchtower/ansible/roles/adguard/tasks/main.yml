---
- name: Check if AdGuard Home is already installed
  stat:
    path: /opt/AdGuardHome/AdGuardHome
  register: agh_binary

- name: Download AdGuard Home tarball
  get_url:
    url: https://github.com/AdguardTeam/AdGuardHome/releases/latest/download/AdGuardHome_linux_amd64.tar.gz
    dest: /tmp/AdGuardHome.tar.gz
  when: not agh_binary.stat.exists

- name: Extract AdGuard Home
  unarchive:
    src: /tmp/AdGuardHome.tar.gz
    dest: /opt/
    remote_src: yes
  when: not agh_binary.stat.exists

- name: Install AdGuard Home service
  command: /opt/AdGuardHome/AdGuardHome -s install
  when: not agh_binary.stat.exists

- name: Deploy AdGuard Home config
  template:
    src: AdGuardHome.yaml.j2
    dest: /opt/AdGuardHome/AdGuardHome.yaml
    owner: root
    group: root
    mode: '0644'
  notify: restart adguardhome

- name: Enable and start AdGuard Home
  systemd:
    name: AdGuardHome
    enabled: yes
    state: started
