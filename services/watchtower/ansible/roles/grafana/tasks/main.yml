---
- name: Install Grafana GPG key
  apt_key:
    url: https://apt.grafana.com/gpg.key
    state: present

- name: Add Grafana apt repository
  apt_repository:
    repo: deb https://apt.grafana.com stable main
    state: present
    filename: grafana

- name: Install Grafana
  apt:
    name: grafana
    state: present
    update_cache: yes

- name: Deploy Grafana config
  template:
    src: grafana.ini.j2
    dest: /etc/grafana/grafana.ini
    owner: root
    group: grafana
    mode: '0640'
  notify: restart grafana

- name: Deploy Grafana datasource provisioning
  template:
    src: datasources.yml.j2
    dest: /etc/grafana/provisioning/datasources/prometheus.yml
    owner: root
    group: grafana
    mode: '0640'
  notify: restart grafana

- name: Deploy Grafana dashboard provisioning
  template:
    src: dashboards.yml.j2
    dest: /etc/grafana/provisioning/dashboards/homelab.yml
    owner: root
    group: grafana
    mode: '0640'
  notify: restart grafana

- name: Create dashboard directory
  file:
    path: /var/lib/grafana/dashboards
    state: directory
    owner: grafana
    group: grafana
    mode: '0755'

- name: Find all dashboard files currently on disk
  ansible.builtin.find:
    paths: /var/lib/grafana/dashboards
    patterns: '*.json'
  register: existing_dashboards

- name: Remove any dashboard files not in our managed list
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ existing_dashboards.files }}"
  when: item.path | basename not in managed_dashboards
  vars:
    managed_dashboards:
      - node-exporter-full.json
      - k3s-cluster.json
      - blackbox-exporter.json
      - snmp-interfaces.json
      - tmobile-gateway.json
      - reolink-nvr.json
  notify: restart grafana

- name: Download Node Exporter Full dashboard (ID 1860)
  ansible.builtin.get_url:
    url: https://grafana.com/api/dashboards/1860/revisions/latest/download
    dest: /var/lib/grafana/dashboards/node-exporter-full.json
    owner: grafana
    group: grafana
    mode: '0644'
  notify: restart grafana

- name: Patch Node Exporter Full datasource variable
  ansible.builtin.replace:
    path: /var/lib/grafana/dashboards/node-exporter-full.json
    regexp: '\$\{DS_PROMETHEUS[^}]*\}'
    replace: 'PBFA97CFB590B2093'
  notify: restart grafana

- name: Deploy k3s cluster dashboard (custom)
  ansible.builtin.copy:
    src: k3s-cluster.json
    dest: /var/lib/grafana/dashboards/k3s-cluster.json
    owner: grafana
    group: grafana
    mode: '0644'
  notify: restart grafana

- name: Deploy Blackbox probes dashboard (custom)
  ansible.builtin.copy:
    src: blackbox-probes.json
    dest: /var/lib/grafana/dashboards/blackbox-exporter.json
    owner: grafana
    group: grafana
    mode: '0644'
  notify: restart grafana

- name: Deploy SNMP interfaces dashboard (custom)
  ansible.builtin.copy:
    src: snmp-interfaces.json
    dest: /var/lib/grafana/dashboards/snmp-interfaces.json
    owner: grafana
    group: grafana
    mode: '0644'
  notify: restart grafana

- name: Deploy T-Mobile 5G Gateway dashboard (custom)
  ansible.builtin.copy:
    src: tmobile-gateway.json
    dest: /var/lib/grafana/dashboards/tmobile-gateway.json
    owner: grafana
    group: grafana
    mode: '0644'
  notify: restart grafana

- name: Deploy Reolink NVR dashboard (custom)
  ansible.builtin.copy:
    src: reolink-nvr.json
    dest: /var/lib/grafana/dashboards/reolink-nvr.json
    owner: grafana
    group: grafana
    mode: '0644'
  notify: restart grafana

- name: Deploy Grafana alerting provisioning
  template:
    src: alerting.yml.j2
    dest: /etc/grafana/provisioning/alerting/sentinel.yml
    owner: root
    group: grafana
    mode: '0640'
  notify: restart grafana

- name: Deploy Grafana alert rules
  template:
    src: alert_rules.yml.j2
    dest: /etc/grafana/provisioning/alerting/alert_rules.yml
    owner: root
    group: grafana
    mode: '0640'
  notify: restart grafana

- name: Enable and start Grafana
  systemd:
    name: grafana-server
    enabled: yes
    state: started

# Flush pending handlers so Grafana restarts with all provisioning changes
# applied before we stop it for SQLite maintenance.
- name: Flush handlers to apply any pending Grafana restart
  ansible.builtin.meta: flush_handlers

# ── SQLite maintenance: delete unmanaged dashboards from the DB ───────────
# Removing only dashboard_provisioning rows in the previous attempt was not
# enough — Grafana re-inserts them on startup, which means the orphan JSON
# files are still being found by the provisioner somewhere on disk.
#
# Deleting the dashboard rows themselves is definitive: the provisioner has
# nothing to re-attach to. Managed dashboards are re-created from their
# files on the next startup; orphans don't come back.
#
# Order matters: clear dashboard_provisioning first (FK side), then delete
# the dashboard rows. SQLite FK enforcement is off by default so this won't
# cascade automatically — we handle both tables explicitly.

- name: Ensure sqlite3 CLI is installed
  ansible.builtin.apt:
    name: sqlite3
    state: present

- name: Read node-exporter-full UID from disk
  ansible.builtin.slurp:
    src: /var/lib/grafana/dashboards/node-exporter-full.json
  register: nef_raw

- name: Set node-exporter-full UID fact
  ansible.builtin.set_fact:
    nef_uid: "{{ (nef_raw.content | b64decode | from_json).uid }}"

- name: Stop Grafana for SQLite maintenance
  systemd:
    name: grafana-server
    state: stopped

- name: Clear dashboard_provisioning rows for unmanaged dashboards
  ansible.builtin.shell: >-
    sqlite3 /var/lib/grafana/grafana.db
    "DELETE FROM dashboard_provisioning WHERE dashboard_id IN
    (SELECT id FROM dashboard WHERE is_folder=0 AND uid NOT IN
    ('lwa-blackbox-probes','lwa-k3s-cluster','lwa-reolink-nvr',
    'lwa-snmp-interfaces','lwa-tmobile-gateway','{{ nef_uid }}'));"
  changed_when: true

- name: Delete unmanaged dashboard rows from Grafana DB
  ansible.builtin.shell: >-
    sqlite3 /var/lib/grafana/grafana.db
    "DELETE FROM dashboard WHERE is_folder=0 AND uid NOT IN
    ('lwa-blackbox-probes','lwa-k3s-cluster','lwa-reolink-nvr',
    'lwa-snmp-interfaces','lwa-tmobile-gateway','{{ nef_uid }}');"
  changed_when: true

- name: Start Grafana after SQLite maintenance
  systemd:
    name: grafana-server
    state: started

# ── API purge: safety net for any non-provisioned orphans ─────────────────
# Dashboards deleted from the SQLite DB above won't appear here. This step
# catches any remaining unmanaged dashboards that survived without a
# provisioning marker (plain UI imports that don't hit the 400/500 error).

- name: Wait for Grafana to be ready
  ansible.builtin.uri:
    url: "http://localhost:{{ port_grafana }}/api/health"
    status_code: 200
  register: grafana_health
  retries: 12
  delay: 5
  until: grafana_health.status == 200

- name: Get all dashboards from Grafana
  ansible.builtin.uri:
    url: "http://localhost:{{ port_grafana }}/api/search?type=dash-db&limit=100"
    user: admin
    password: "{{ vault_grafana_password }}"
    force_basic_auth: true
    return_content: true
  register: all_grafana_dashboards

- name: Build list of unmanaged dashboard UIDs to purge
  ansible.builtin.set_fact:
    grafana_orphan_uids: >-
      {{ all_grafana_dashboards.json
         | selectattr('uid', 'defined')
         | rejectattr('uid', 'in', managed_dashboard_uids + [nef_uid])
         | map(attribute='uid')
         | list }}
  vars:
    managed_dashboard_uids:
      - lwa-blackbox-probes
      - lwa-k3s-cluster
      - lwa-reolink-nvr
      - lwa-snmp-interfaces
      - lwa-tmobile-gateway

- name: Delete each unmanaged dashboard
  ansible.builtin.uri:
    url: "http://localhost:{{ port_grafana }}/api/dashboards/uid/{{ item }}"
    method: DELETE
    user: admin
    password: "{{ vault_grafana_password }}"
    force_basic_auth: true
    status_code: [200, 404]
  loop: "{{ grafana_orphan_uids }}"
