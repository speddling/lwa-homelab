---
- name: Create alertmanager system user
  user:
    name: alertmanager
    system: yes
    shell: /usr/sbin/nologin
    create_home: no

- name: Create alertmanager directories
  file:
    path: "{{ item }}"
    state: directory
    owner: alertmanager
    group: alertmanager
    mode: '0755'
  loop:
    - /etc/alertmanager
    - /var/lib/alertmanager

- name: Check if Alertmanager is already installed
  stat:
    path: /usr/local/bin/alertmanager
  register: alertmanager_binary

- name: Download Alertmanager tarball
  get_url:
    url: https://github.com/prometheus/alertmanager/releases/download/v0.27.0/alertmanager-0.27.0.linux-amd64.tar.gz
    dest: /tmp/alertmanager.tar.gz
  when: not alertmanager_binary.stat.exists

- name: Extract Alertmanager
  unarchive:
    src: /tmp/alertmanager.tar.gz
    dest: /tmp/
    remote_src: yes
  when: not alertmanager_binary.stat.exists

- name: Install Alertmanager binaries
  copy:
    src: "/tmp/alertmanager-0.27.0.linux-amd64/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    owner: root
    group: root
    mode: '0755'
    remote_src: yes
  loop:
    - alertmanager
    - amtool
  when: not alertmanager_binary.stat.exists

- name: Deploy Alertmanager config
  template:
    src: alertmanager.yml.j2
    dest: /etc/alertmanager/alertmanager.yml
    owner: alertmanager
    group: alertmanager
    mode: '0640'
  notify: restart alertmanager

- name: Deploy Alertmanager systemd unit
  template:
    src: alertmanager.service.j2
    dest: /etc/systemd/system/alertmanager.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - reload systemd
    - restart alertmanager

- name: Enable and start Alertmanager
  systemd:
    name: alertmanager
    enabled: yes
    state: started
